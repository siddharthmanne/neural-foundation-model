# Smoke trainer — same shape as 4m_things_main.yaml (paths in 4m_smoke_things_data.yaml).
run_name: smoke_things
model: fm_tiny_6e_6d_swiglu_nobias
input_size: 224
patch_size: 16
batch_size: 2
epochs: 1
epoch_size: 8
num_input_tokens: 64
num_target_tokens: 64
loss_type: mod
dtype: bfloat16

data_config: 4m_training/configs/4m_smoke_things_data.yaml
# text_tokenizer_path: auto-derived from FOURM_ML4M_DIR (repo_paths.py); set here only to override.

eval_freq: 999
save_ckpt_freq: 999
# Fresh dir: the old things_prod_format checkpoint predates the input-only redesign
# (different param shapes), so it can't be resumed into the current model.
output_dir: /project/runs/smoke/things_inputonly
num_workers: 1  # must be >= 1 (stock mixture loader divides by num_workers)
warmup_epochs: 0
# auto_resume stays on (4M default): with the torch.load fix in train_4m.run_train,
# pausing and resuming a same-architecture run works. A fresh output_dir just means
# the first run starts from scratch.

opt: adamw
blr: 0.0001
weight_decay: 0.05
log_wandb: false
