# Smoke data — same shape as 4m_things_data.yaml (one shard on the project volume).
train:
  datasets:
    things:
      type: multimodal
      use_wds: true
      # Brace range required: shard_{000} is literal; use {000..000} for one shard or {000..026} for all.
      data_path: /project/data/train/things/[tok_rgb,tok_depth,tok_meg,tok_eeg,meg_mask,eeg_mask]/shard_{000..000}.tar
      in_domains: tok_rgb-tok_depth-tok_meg-tok_eeg
      out_domains: tok_rgb-tok_depth   # tok_meg/tok_eeg are input-only
      main_augment_domain: tok_rgb
      tok_train_aug: false
      input_alphas: "1.0-1.0-1.0-1.0"
      target_alphas: "1.0-1.0"
      aligned_captions: false
      wds_n_repeats: 1
      wds_shuffle_buffer_tar: 50
      wds_shuffle_buffer_repeat: 50
  weights: [1.0]
