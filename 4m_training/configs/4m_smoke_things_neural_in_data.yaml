# Smoke data variant: predict depth from RGB + MEG (neural used as INPUT only).
# Demonstrates the --data_config override and neural-as-conditioning. Reuse the same *_main.yaml.
train:
  datasets:
    things:
      type: multimodal
      use_wds: true
      data_path: /project/data/train/things/[tok_rgb,tok_depth,tok_meg,meg_mask]/shard_{000..000}.tar
      in_domains: tok_rgb-tok_meg     # MEG is input-only (conditioning)
      out_domains: tok_depth          # predict depth tokens
      main_augment_domain: tok_rgb
      tok_train_aug: false
      input_alphas: "1.0-1.0"         # rgb, meg
      target_alphas: "1.0"            # depth
      aligned_captions: false
      wds_n_repeats: 1
      wds_shuffle_buffer_tar: 50
      wds_shuffle_buffer_repeat: 50
  weights: [1.0]
