# Smoke CC12M — same shape as 4m_things_data.yaml; data lives on project volume only.
train:
  datasets:
    cc12m:
      type: multimodal
      use_wds: true
      data_path: /project/data/train/cc12m/[rgb@224,caption,crop_settings,tok_rgb@224,tok_depth@224]/shard-{00000..00002}.tar
      in_domains: rgb@224-tok_rgb@224-tok_depth@224-caption
      out_domains: tok_rgb@224-tok_depth@224-caption
      main_augment_domain: rgb@224
      aligned_captions: true
      tok_train_aug: true
      input_alphas: "1.0-1.0-1.0-1.0"   # 4 in_domains
      target_alphas: "1.0-1.0-1.0"      # 3 out_domains (caption is in-only)
      wds_n_repeats: 1
      wds_shuffle_buffer_tar: 50
      wds_shuffle_buffer_repeat: 50
  weights: [1.0]
