# Smoke trainer tuned to SHOW loss decreasing in the central (run_training_4m) path:
# real effective LR (blr*batch/256) and enough steps, on one real shard.
run_name: smoke_loss
model: fm_tiny_6e_6d_swiglu_nobias
input_size: 224
patch_size: 16
batch_size: 4
epochs: 8
epoch_size: 64          # 16 steps/epoch x 8 = 128 steps
num_input_tokens: 128
num_target_tokens: 128
loss_type: mod
dtype: bfloat16

data_config: 4m_training/configs/4m_smoke_things_data.yaml
# text_tokenizer_path: auto-derived from FOURM_ML4M_DIR (repo_paths.py); set here only to override.

eval_freq: 999
save_ckpt_freq: 999
output_dir: /project/runs/smoke/things_loss
num_workers: 1
warmup_epochs: 1
cooldown_epochs: 0      # keep LR up so loss can actually move
auto_resume: false      # always start fresh for this demo

opt: adamw
blr: 0.03               # effective lr = 0.03 * 4 / 256 ~= 4.7e-4
weight_decay: 0.05
log_wandb: false
