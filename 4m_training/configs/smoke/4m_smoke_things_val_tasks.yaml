# Smoke copy of 4m_things_val_tasks.yaml for exercising IN-LOOP validation on GPU.
# Points at ONE TRAIN shard (guaranteed present on the volume) and is capped to a
# single batch/task by the smoke main's `in_loop_val_n_batches: 1`. The losses are
# meaningless (validating on train data after ~1 epoch); the point is to prove all
# four tasks run on the live model during training. See 4m_things_val_tasks.yaml for
# the real, documented version.
val_root: /project/data/train/things
shards: "shard_{000..000}.tar"
main_augment_domain: tok_rgb

fixed_eval_input_tokens: 64
fixed_eval_target_tokens: 64

tasks:
  anyany_neural:
    modalities: [tok_rgb, tok_depth, tok_meg, tok_eeg, meg_mask, eeg_mask]
    in_domains: tok_rgb-tok_depth-tok_meg_rvq0-tok_meg_rvq1-tok_meg_rvq2-tok_meg_rvq3-tok_eeg
    out_domains: tok_rgb-tok_depth

  anyany_noneural:
    modalities: [tok_rgb, tok_depth]
    in_domains: tok_rgb-tok_depth
    out_domains: tok_rgb-tok_depth

  rgb2depth:
    modalities: [tok_rgb, tok_depth]
    in_domains: tok_rgb
    out_domains: tok_depth

  depth2rgb:
    modalities: [tok_rgb, tok_depth]
    in_domains: tok_depth
    out_domains: tok_rgb
