# Smoke trainer — same shape as production main configs; data in 4m_smoke_cc12m_data.yaml.
run_name: smoke_cc12m
model: fm_tiny_6e_6d_swiglu_nobias
input_size: 224
patch_size: 16
batch_size: 2
epochs: 1
epoch_size: 8
num_input_tokens: 64
num_target_tokens: 64
loss_type: mod
dtype: bfloat16

data_config: 4m_training/configs/4m_smoke_cc12m_data.yaml
# text_tokenizer_path: auto-derived from FOURM_ML4M_DIR (repo_paths.py); set here only to override.

eval_freq: 999
save_ckpt_freq: 999
output_dir: /project/runs/smoke/cc12m_prod_format
num_workers: 1
warmup_epochs: 0
no_auto_resume: true

opt: adamw
blr: 0.0001
weight_decay: 0.05
log_wandb: false
